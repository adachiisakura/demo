spring:
  profiles:
    active: dev
  datasource:
    username: ${demo.mysql-user}
    password: ${demo.mysql-password}
    url: ${demo.mysql-host}
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    # 发送者邮箱
    username: ${demo.mail.user}
    #申请到的授权码
    password: ${demo.mail.password}
    # 配置 SMTP 服务器地址
    host: smtp.qq.com
    # 端口号465或587
    port: 465
    protocol: smtps
    # 默认的邮件编码为UTF-8
    default-encoding: UTF-8
    # 配置SSL 加密工厂
    properties:
      mail:
        smtp:
          socketFactoryClass: javax.net.ssl.SSLSocketFactory
          #表示开启 DEBUG 模式，这样，邮件发送过程的日志会在控制台打印出来，方便排查错误
          debug: true
          ssl: true
  data:
    redis:
      host: ${demo.redis.host}
      port: ${demo.redis.port}
mybatis-plus:
  mapper-locations: classpath/mapper/*
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
jwt:
  key: ${demo.jwt.key}
  ttl: ${demo.jwt.ttl}

cos:
  secretId: ${demo.cos.secretId}
  secretKey: ${demo.cos.secretKey}
  region: ${demo.cos.region}
  bucketname: ${demo.cos.bucketname}
  rootSrc: ${demo.cos.rootSrc}
